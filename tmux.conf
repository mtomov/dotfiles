set -g mouse on

unbind C-o
bind C-O rotate-window

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set-environment -g CLAUDE_CODE_TMUX_TRUECOLOR true
set-environment -gr NO_COLOR
set-environment -gr FORCE_COLOR

set -g default-terminal "screen-256color"
set -g allow-passthrough on
set -as terminal-features "*:RGB"

# Claude Code already owns the active bottom UI. Keep tmux quiet unless needed.
set -g status off
bind-key B set-option -g status
set -g status-style bg=default,fg=colour244
set -g status-left "[#{session_name}] "
set -g status-right ""
